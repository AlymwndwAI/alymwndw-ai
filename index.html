<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Jewelry Store</title>

<style>
body{
  margin:0;
  background:#0b141a;
  color:white;
  font-family:Arial;
}

.container{
  max-width:600px;
  margin:auto;
  padding:10px;
}

.card{
  background:#111b21;
  margin:10px 0;
  padding:10px;
  border-radius:15px;
}

img{
  width:100%;
  border-radius:10px;
}

.price{
  color:#00d2a0;
  font-weight:bold;
}

.variant{
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="container" id="app"></div>

<script>

async function load(){

try {

const res = await fetch("/products");
const data = await res.json();

let html = "";

if(!data.length){
  document.getElementById("app").innerHTML = "❌ No products";
  return;
}

data.forEach(p => {

let variantsHTML = "";

p.variants.forEach(v => {
variantsHTML += `
<div class="variant">
💎 Metal: ${v.metal || "-"} | Stone: ${v.stone || "-"} | Size: ${v.size || "-"}
<br>💰 ${v.price}
</div>
`;
});

html += `
<div class="card">
<img src="${p.image}" />
<h3>${p.title}</h3>
${variantsHTML}
</div>
`;

});

document.getElementById("app").innerHTML = html;

} catch(e){
document.getElementById("app").innerHTML =
"❌ Failed to load products";
}

}

load();

</script>

</body>
</html>
