<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Jewelry Store</title>

<style>
body{
  margin:0;
  background:#0b141a;
  color:white;
  font-family:Arial;
}

.container{
  max-width:600px;
  margin:auto;
  padding:10px;
}

.card{
  background:#111b21;
  margin:10px 0;
  padding:10px;
  border-radius:15px;
}

img{
  width:100%;
  border-radius:10px;
}

.title{
  font-size:18px;
  margin:8px 0;
}

.badge{
  display:inline-block;
  background:#222;
  padding:4px 8px;
  border-radius:6px;
  margin:3px;
  font-size:11px;
}

.price{
  color:#00d2a0;
  font-weight:bold;
  margin-top:5px;
}

.variant{
  margin-top:8px;
  font-size:12px;
  color:#aaa;
}
</style>

</head>

<body>

<div class="container" id="app"></div>

<script>

async function load(){

try {

const res = await fetch("/products");
const data = await res.json();

if(!data.length){
  document.getElementById("app").innerHTML = "❌ No products";
  return;
}

let html = "";

data.forEach(p => {

let variantsHTML = "";

p.variants.forEach(v => {

variantsHTML += `
<div class="variant">
<span class="badge">💎 ${v.metal}</span>
<span class="badge">💠 ${v.stone}</span>
<span class="badge">📏 ${v.size}</span>
<br>
<span class="price">💰 ${v.price}</span>
</div>
`;

});

html += `
<div class="card">
<img src="${p.image}" />
<div class="title">${p.title}</div>
${variantsHTML}
</div>
`;

});

document.getElementById("app").innerHTML = html;

} catch(e){
document.getElementById("app").innerHTML =
"❌ Failed to load products";
}

}

load();

</script>

</body>
</html>
