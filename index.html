<!DOCTYPE html>
<html>
<head>
  <title>AI Jewelry Store</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b141a;
      color:white;
    }

    .chat {
      height: 90vh;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      background:#1f2c34;
      padding:10px;
      margin:10px;
      border-radius:10px;
      max-width:70%;
    }

    .me {
      background:#005c4b;
      margin-left:auto;
    }

    .products {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .card {
      background:#111b21;
      padding:10px;
      border-radius:10px;
      width:200px;
    }

    img {
      width:100%;
      border-radius:10px;
    }

    .inputBox {
      display:flex;
      position:fixed;
      bottom:0;
      width:100%;
    }

    input {
      flex:1;
      padding:15px;
      border:none;
    }

    button {
      padding:15px;
      background:#00a884;
      border:none;
      color:white;
    }
  </style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="inputBox">
  <input id="text" placeholder="اكتب رسالتك..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {

  let text = document.getElementById("text").value;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg me">${text}</div>`;

  document.getElementById("text").value = "";

  let res = await fetch("/products");
  let products = await res.json();

  let html = `<div class="msg">💎 منتجات الكولكشن:</div><div class="products">`;

  products.forEach(p => {
    html += `
      <div class="card">
        <img src="${p.image}" />
        <h4>${p.title}</h4>
        <p>$${p.price}</p>
      </div>
    `;
  });

  html += `</div>`;

  chat.innerHTML += html;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
