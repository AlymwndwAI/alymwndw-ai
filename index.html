<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Jewelry Store</title>

<style>
body{
  margin:0;
  background:#0b141a;
  color:white;
  font-family:Arial;
}

.container{
  max-width:520px;
  margin:auto;
  padding:10px;
}

.card{
  background:#111b21;
  margin:12px 0;
  padding:12px;
  border-radius:15px;
}

img{
  width:100%;
  border-radius:12px;
}

.title{
  font-size:16px;
  margin-top:10px;
}

.price{
  color:#00d2a0;
  font-weight:bold;
  margin-top:8px;
}

.badge{
  display:inline-block;
  background:#1f2a33;
  padding:5px 8px;
  border-radius:8px;
  margin:4px 4px 0 0;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

async function load(){

  try {

    const res = await fetch("/products");
    const data = await res.json();

    let html = "";

    if(!data || data.length === 0){
      document.getElementById("app").innerHTML =
        "<h3>❌ No products</h3>";
      return;
    }

    data.forEach(p => {

      // ====== PRICE FIX ======
      let prices = (p.variants || [])
        .map(v => parseFloat(v.price))
        .filter(Boolean);

      let priceHTML = "";

      if(prices.length > 0){
        let min = Math.min(...prices);
        let max = Math.max(...prices);

        priceHTML = (min === max)
          ? `💰 ${min} AED`
          : `💰 ${min} - ${max} AED`;
      } else {
        priceHTML = "💰 N/A";
      }

      // ====== VARIANTS (NO DUPLICATION) ======
      let variantsHTML = "<div style='margin-top:10px'>";

      if(p.variants && p.variants.length){

        p.variants.forEach(v => {

          variantsHTML += `
            <span class="badge">
              ${v.title ? v.title : "Variant"} - ${v.price} AED
            </span>
          `;
        });

      }

      variantsHTML += "</div>";

      // ====== PRODUCT CARD ======
      html += `
        <div class="card">

          <img src="${p.image || ''}" />

          <div class="title">${p.title}</div>

          <div class="price">${priceHTML}</div>

          ${variantsHTML}

        </div>
      `;
    });

    document.getElementById("app").innerHTML = html;

  } catch (err) {
    document.getElementById("app").innerHTML =
      "<h3>❌ Failed to load products</h3>";
    console.log(err);
  }
}

load();

</script>

</body>
</html>
