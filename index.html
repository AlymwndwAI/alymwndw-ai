<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Jewelry Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b141a;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:10px;
}

.card{
background:#111b21;
margin:10px 0;
padding:10px;
border-radius:12px;
}

img{
width:100%;
border-radius:10px;
}

.price{
color:#00d2a0;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container" id="app"></div>

<script>

async function load(){

const res = await fetch("/products");
const data = await res.json();

let html = "";

if(!data.length){
html = "<h3>❌ مفيش منتجات ظاهرة</h3>";
}

data.forEach(p=>{
html += `
<div class="card">
<img src="${p.image}" />
<h3>${p.title}</h3>
<div class="price">$${p.price}</div>
</div>
`;
});

document.getElementById("app").innerHTML = html;

}

load();

</script>

</body>
</html>
