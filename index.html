<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Jewelry Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* chat container */
#chat {
  height: calc(100vh - 60px);
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* messages */
.msg {
  background: white;
  padding: 10px;
  border-radius: 12px;
  max-width: 80%;
  word-wrap: break-word;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* product cards */
.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  max-width: 90%;
}

.card img {
  width: 100%;
  border-radius: 10px;
  object-fit: cover;
}

/* input bar */
#box {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
  padding: 8px;
  border-top: 1px solid #ddd;
}

input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

button {
  margin-left: 8px;
  padding: 10px 15px;
  border: none;
  background: black;
  color: white;
  border-radius: 8px;
}

/* mobile fix */
@media (max-width: 600px) {
  .msg { max-width: 95%; font-size: 14px; }
  .card { max-width: 100%; }
}
</style>

</head>

<body>

<div id="chat"></div>

<div id="box">
  <input id="msg" placeholder="اكتب..." />
  <button onclick="send()">Send</button>
</div>

<script>

const chat = document.getElementById("chat");

function add(text){
  chat.innerHTML += `<div class="msg">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

function show(products){
  products.forEach(p=>{
    chat.innerHTML += `
      <div class="card">
        <img src="${p.images?.[0]?.src || ''}" />
        <b>${p.title}</b><br/>
        💰 ${p.variants?.[0]?.price || 0}
      </div>
    `;
  });
  chat.scrollTop = chat.scrollHeight;
}

async function send(){

  const input = document.getElementById("msg");
  const msg = input.value;

  if(!msg) return;

  add("🧑‍💬 " + msg);

  input.value = "";

  const res = await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  add("🤖 " + data.reply);
  show(data.products || []);

}

</script>

</body>
</html>
