<!DOCTYPE html>
<html>
<head>
  <title>AI Jewelry Store</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b141a;
      color:white;
    }

    #app {
      max-width:450px;
      margin:auto;
      padding-bottom:120px;
    }

    .msg-user {
      background:#005c4b;
      padding:10px;
      margin:8px;
      border-radius:10px;
      text-align:right;
    }

    .msg-ai {
      background:#1f2c34;
      padding:10px;
      margin:8px;
      border-radius:10px;
    }

    .grid {
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:10px;
    }

    .card {
      background:#111b21;
      border-radius:15px;
      overflow:hidden;
      padding:10px;
    }

    .card img {
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:10px;
    }

    .price {
      color:#d4af37;
      margin-top:5px;
      font-weight:bold;
    }

    .btn {
      background:#00a884;
      border:none;
      color:white;
      padding:10px;
      width:100%;
      border-radius:10px;
      margin-top:10px;
      cursor:pointer;
    }

    #inputBox {
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      background:#0b141a;
      display:flex;
      padding:10px;
    }

    input {
      flex:1;
      padding:12px;
      border-radius:20px;
      border:none;
      outline:none;
    }

    button {
      margin-left:10px;
      padding:12px 16px;
      border-radius:20px;
      border:none;
      background:#d4af37;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="app">
  <div id="chat"></div>
</div>

<div id="inputBox">
  <input id="msg" placeholder="اكتب رسالة..." />
  <button onclick="send()">Send</button>
</div>

<script>

function addUser(text){
  document.getElementById("chat").innerHTML +=
    `<div class="msg-user">${text}</div>`;
}

function addAI(text){
  document.getElementById("chat").innerHTML +=
    `<div class="msg-ai">🤖 ${text}</div>`;
}

function addProducts(products){

  if(!Array.isArray(products)) return;

  const html = products.map(p => `
    <div class="card">
      <img src="${p.image || ''}" />
      <div><b>${p.title || ''}</b></div>
      <div class="price">💰 ${p.price || ''}</div>
      <button class="btn">Buy Now</button>
    </div>
  `).join("");

  document.getElementById("chat").innerHTML +=
    `<div class="grid">${html}</div>`;
}

async function send(){

  const msg = document.getElementById("msg").value;
  if(!msg) return;

  addUser(msg);

  const res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  addAI(data.text || "");
  addProducts(data.products);

  document.getElementById("msg").value = "";

  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}

</script>

</body>
</html>
