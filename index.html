<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

body{
background:#070707;
font-family:Arial;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:420px;
background:#111;
padding:20px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,255,200,.15);
}

h1{
text-align:center;
margin-bottom:20px;
font-size:42px;
}

.chat-box{
height:400px;
overflow-y:auto;
background:#1a1a1a;
padding:15px;
border-radius:18px;
margin-bottom:15px;
}

.message{
padding:14px;
border-radius:15px;
margin-bottom:10px;
max-width:80%;
line-height:1.7;
}

.user{
background:#16e0bc;
color:black;
margin-left:auto;
}

.ai{
background:#2d2d2d;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border:none;
border-radius:15px;
background:#222;
color:white;
font-size:16px;
}

button{
padding:16px;
border:none;
border-radius:15px;
background:#16e0bc;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

.products{
margin-top:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.product{
background:#1c1c1c;
padding:10px;
border-radius:15px;
}

.product img{
width:100%;
border-radius:10px;
}

.product h3{
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>
💎 Alymwndw AI
</h1>

<div
class="chat-box"
id="chat-box"
></div>

<div class="input-area">

<input
id="message"
placeholder="Ask about jewelry..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

<div
class="products"
id="products"
></div>

</div>

<script>

const chatBox =
document.getElementById("chat-box");

function addMessage(text,type){

const div =
document.createElement("div");

div.className =
`message ${type}`;

div.innerText =
text;

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

}


async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value;

if(!message) return;

addMessage(message,"user");

input.value = "";

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

addMessage(data.reply,"ai");

}


async function loadProducts(){

const response =
await fetch("/products");

const products =
await response.json();

const container =
document.getElementById("products");

products.forEach(product=>{

const image =
product.images?.[0]?.src || "";

container.innerHTML += `
<div class="product">

<img src="${image}" />

<h3>
${product.title}
</h3>

</div>
`;

});

}

loadProducts();

</script>

</body>
</html>
