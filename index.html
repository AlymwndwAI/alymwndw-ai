<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alymwndw AI 💎</title>

<style>
body{
  margin:0;
  background:#0b141a;
  color:white;
  font-family:Arial;
}

.container{
  max-width:520px;
  margin:auto;
  padding:10px;
}

.card{
  background:#111b21;
  margin:10px 0;
  padding:10px;
  border-radius:15px;
}

img{
  width:100%;
  border-radius:10px;
}

input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#00d2a0;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h3>💎 Alymwndw AI Store</h3>

<input id="msg" placeholder="Ask AI..." />
<button onclick="send()">Ask AI</button>

<input id="imgPrompt" placeholder="Generate image..." />
<button onclick="generateImage()">Generate Image</button>

<div id="chat"></div>
<div id="imageBox"></div>
<div id="products"></div>

</div>

<script>

// ================= CHAT =================
async function send(){

  const msg = document.getElementById("msg").value;

  const res = await fetch("/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  document.getElementById("chat").innerHTML =
    `<div class="card">${data.reply || data.error}</div>`;
}

// ================= IMAGE =================
async function generateImage(){

  const prompt = document.getElementById("imgPrompt").value;

  const res = await fetch("/generate-image", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  if(!data.image){
    alert(data.error || "Image failed");
    return;
  }

  document.getElementById("imageBox").innerHTML =
    `<div class="card"><img src="${data.image}"/></div>`;
}

// ================= PRODUCTS =================
async function load(){

  try {

    const res = await fetch("/products");
    const data = await res.json();

    let html = "";

    data.forEach(p => {

      let price =
        p.price_min === p.price_max
          ? `${p.price_min} AED`
          : `${p.price_min} - ${p.price_max} AED`;

      html += `
        <div class="card">
          <img src="${p.image}" />
          <h3>${p.title}</h3>
          <div>${price}</div>
        </div>
      `;
    });

    document.getElementById("products").innerHTML = html;

  } catch(e){
    document.getElementById("products").innerHTML =
      `<div class="card">Loading failed</div>`;
  }
}

load();

</script>

</body>
</html>
