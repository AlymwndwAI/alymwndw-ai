<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

body{
margin:0;
padding:0;
background:#050505;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:420px;
background:#111;
padding:20px;
border-radius:30px;
box-shadow:
0 0 35px rgba(0,255,200,.12);
}

.logo{
font-size:42px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.chat-box{
height:500px;
overflow-y:auto;
background:#181818;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.message{
padding:15px;
border-radius:18px;
margin-bottom:12px;
max-width:85%;
line-height:1.8;
white-space:pre-wrap;
}

.user{
background:#18e0bd;
color:black;
margin-left:auto;
}

.ai{
background:#2a2a2a;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:16px;
background:#222;
color:white;
font-size:16px;
}

button{
padding:16px;
border:none;
border-radius:16px;
background:#18e0bd;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.typing{
opacity:.7;
font-style:italic;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
💎 Alymwndw AI
</div>

<div
class="chat-box"
id="chat-box"
></div>

<div class="input-area">

<input
id="message"
placeholder="Ask about jewelry..."
onkeydown="handleKey(event)"
>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const chatBox =
document.getElementById("chat-box");

function addMessage(text,type){

const div =
document.createElement("div");

div.className =
`message ${type}`;

div.innerText =
text;

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

return div;

}


function handleKey(event){

if(event.key === "Enter"){
sendMessage();
}

}


async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value;

if(!message) return;

addMessage(message,"user");

input.value = "";

const typing =
addMessage(
"Alymwndw AI is typing...",
"ai typing"
);

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

typing.remove();

addMessage(data.reply,"ai");

}

</script>

</body>
</html>
