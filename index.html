<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Jewelry Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#050b10,#0b141a);
color:white;
}

/* CHAT */
.chat{
height:90vh;
overflow:auto;
padding:15px;
}

.msg{
padding:12px 14px;
margin:10px;
border-radius:14px;
max-width:75%;
animation:fade .3s ease;
}

.me{
background:#0aa37f;
margin-left:auto;
}

.ai{
background:#1b2730;
border:1px solid #2b3b45;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.card{
background:#111b21;
border-radius:14px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
transition:.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#00d2a0;
font-weight:bold;
}

/* INPUT */
.input{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:#0b141a;
padding:10px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:14px;
margin-left:10px;
border:none;
border-radius:10px;
background:#00a884;
color:white;
font-weight:bold;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input">
<input id="text" placeholder="اكتب عن الخاتم اللي عايزه..." />
<button onclick="send()">Send</button>
</div>

<script>
async function send(){

let t=document.getElementById("text").value;
let chat=document.getElementById("chat");

if(!t) return;

chat.innerHTML+=`
<div class="msg me">${t}</div>
`;

document.getElementById("text").value="";

/* AI reply fake intro */
chat.innerHTML+=`
<div class="msg ai">💎 تمام… بدور لك على أفضل قطع مناسبة</div>
`;

/* products */
let res=await fetch("/products");
let data=await res.json();

let html=`<div class="msg ai">💍 هذه أفضل القطع لك:</div><div class="products">`;

data.slice(0,6).forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}" />
<div>${p.title}</div>
<div class="price">$${p.price}</div>
</div>
`;
});

html+=`</div>`;

chat.innerHTML+=html;
chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
