<!DOCTYPE html>
<html>
<head>
  <title>AI Jewelry Store</title>

  <style>
    body {
      background:#0f0f0f;
      color:white;
      font-family:Arial;
    }

    #chat {
      width:400px;
      margin:40px auto;
    }

    input {
      width:75%;
      padding:10px;
      border-radius:8px;
      border:none;
    }

    button {
      padding:10px;
      border-radius:8px;
      border:none;
      background:#d4af37;
      cursor:pointer;
    }

    .msg {
      background:#222;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      white-space:pre-wrap;
    }

    img {
      width:100px;
      border-radius:10px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div style="text-align:center">
  <input id="msg" placeholder="اكتب رسالتك..." />
  <button onclick="send()">Send</button>
</div>

<script>

function addMsg(text) {
  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg">🤖 ${text}</div>
  `;
}

function addProducts(products) {

  const chat = document.getElementById("chat");

  products.forEach(p => {

    chat.innerHTML += `
      <div class="msg">
        <b>${p.title}</b><br>
        💰 ${p.price}<br>
        <img src="${p.image}" />
      </div>
    `;

  });

}

async function send() {

  const msg = document.getElementById("msg").value;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  addMsg(data.reply);

  addProducts(data.products);

}

</script>

</body>
</html>
