<!DOCTYPE html>
<html>
<head>
  <title>AI Jewelry Store</title>

  <style>
    body {
      background:#0e0e0e;
      color:white;
      font-family:Arial;
    }

    #chat {
      width:420px;
      margin:30px auto;
    }

    .msg {
      background:#222;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      white-space:pre-wrap;
    }

    .product {
      background:#1a1a1a;
      padding:10px;
      border-radius:12px;
      margin:10px 0;
    }

    .product img {
      width:120px;
      border-radius:10px;
    }

    input {
      width:70%;
      padding:10px;
      border-radius:8px;
      border:none;
    }

    button {
      padding:10px;
      border:none;
      background:#d4af37;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div style="text-align:center">
  <input id="msg" placeholder="اكتب..." />
  <button onclick="send()">Send</button>
</div>

<script>

function addText(text) {
  document.getElementById("chat").innerHTML +=
    `<div class="msg">🤖 ${text}</div>`;
}

function addProducts(products) {

  products.forEach(p => {

    document.getElementById("chat").innerHTML += `
      <div class="product">
        <img src="${p.image}" />
        <div><b>${p.title}</b></div>
        <div>💰 ${p.price}</div>
        <button onclick="buy('${p.title}')">Buy Now</button>
      </div>
    `;

  });

}

async function send() {

  const message = document.getElementById("msg").value;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  addText(data.text || "");

  if (data.products) {
    addProducts(data.products);
  }

}

function buy(title){
  alert("Buying: " + title);
}

</script>

</body>
</html>
