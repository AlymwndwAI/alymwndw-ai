<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

body{
margin:0;
padding:0;
background:#0d0d0d;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:400px;
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,255,200,.15);
}

h1{
text-align:center;
font-size:24px;
margin-bottom:20px;
}

.chat-box{
height:350px;
overflow-y:auto;
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.message{
padding:12px;
margin-bottom:10px;
border-radius:12px;
max-width:80%;
}

.user{
background:#00d4aa;
color:black;
margin-left:auto;
}

.ai{
background:#2a2a2a;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
outline:none;
background:#222;
color:white;
}

button{
padding:14px 20px;
border:none;
border-radius:12px;
background:#00d4aa;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#generated-image{
width:100%;
margin-top:15px;
border-radius:15px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>
💎 Alymwndw AI
</h1>

<div
  class="chat-box"
  id="chat-box"
></div>

<div class="input-area">

<input
  id="message"
  placeholder="Ask about jewelry..."
/>

<button onclick="sendMessage()">
Send
</button>

</div>

<br>

<div class="input-area">

<input
  id="imagePrompt"
  placeholder="Generate jewelry image..."
/>

<button onclick="generateImage()">
Generate
</button>

</div>

<img id="generated-image"/>

</div>

<script>

const chatBox =
document.getElementById("chat-box");


function addMessage(text, type){

const div =
document.createElement("div");

div.className =
`message ${type}`;

div.innerText = text;

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

}


async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value;

if(!message) return;

addMessage(message,"user");

input.value = "";

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

addMessage(data.reply,"ai");

}


async function generateImage(){

const prompt =
document.getElementById("imagePrompt").value;

if(!prompt) return;

const response =
await fetch("/generate-image",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt
})

});

const data =
await response.json();

const image =
document.getElementById("generated-image");

image.src =
data.image;

image.style.display =
"block";

}

</script>

</body>
</html>
