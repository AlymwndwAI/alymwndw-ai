<!DOCTYPE html>
<html>
<head>
  <title>AI Jewelry Chat</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#0b141a;
      color:white;
    }

    #chat {
      max-width:420px;
      margin:auto;
      padding:10px;
      height:90vh;
      overflow-y:auto;
    }

    .user {
      background:#005c4b;
      padding:10px;
      margin:8px;
      border-radius:10px;
      text-align:right;
    }

    .ai {
      background:#1f2c34;
      padding:10px;
      margin:8px;
      border-radius:10px;
    }

    .card {
      background:#111b21;
      margin:8px;
      padding:10px;
      border-radius:10px;
    }

    .card img {
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    #inputBox {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      padding:10px;
      background:#202c33;
    }

    input {
      flex:1;
      padding:12px;
      border-radius:20px;
      border:none;
      outline:none;
    }

    button {
      margin-left:10px;
      padding:12px 16px;
      border-radius:20px;
      border:none;
      background:#d4af37;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="اكتب رسالة أو اطلب تصميم..." />
  <button onclick="send()">Send</button>
</div>

<script>

function addUser(text){
  document.getElementById("chat").innerHTML += `
    <div class="user">${text}</div>
  `;
}

function addAI(text){
  document.getElementById("chat").innerHTML += `
    <div class="ai">🤖 ${text}</div>
  `;
}

function addDesign(text, image){
  document.getElementById("chat").innerHTML += `
    <div class="card">
      🤖 ${text}
      <img src="${image}" />
    </div>
  `;
}

async function send(){

  const msg = document.getElementById("msg").value;
  if(!msg) return;

  addUser(msg);

  const res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  if(data.type === "design"){
    addDesign(data.text, data.image);
  } else {
    addAI(data.text);
  }

  document.getElementById("msg").value = "";

  document.getElementById("chat").scrollTop =
    document.getElementById("chat").scrollHeight;
}

</script>

</body>
</html>
