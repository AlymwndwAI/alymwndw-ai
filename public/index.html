<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html, body{
height:100%;
overflow:hidden;
}

body{
background:#050505;
font-family:Arial,sans-serif;
color:white;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#060606;
border-right:1px solid rgba(255,255,255,.06);
padding:30px 20px;
display:flex;
flex-direction:column;
align-items:center;
flex-shrink:0;
}

.sidebar-logo{
width:90px;
height:90px;
border-radius:50%;
background:#0c0c0c;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 30px rgba(0,255,200,.15);
margin-bottom:25px;
overflow:hidden;
}

.sidebar-logo img{
width:58px;
height:58px;
object-fit:contain;
}

.brand{
font-size:22px;
font-weight:700;
text-align:center;
line-height:1.3;
margin-bottom:10px;
}

.brand-sub{
opacity:.65;
text-align:center;
line-height:1.5;
font-size:15px;
}

.chat-area{
flex:1;
display:flex;
flex-direction:column;
background:#000;
min-width:0;
overflow:hidden;
}

.chat-box{
flex:1;
overflow-y:auto;
min-height:0;
padding:30px;
scroll-behavior:smooth;
}

.mobile-header{
display:none;
flex-shrink:0;
}

.message-row{
display:flex;
gap:12px;
margin-bottom:22px;
align-items:flex-start;
}

.user-row{
display:flex;
justify-content:flex-end;
margin-bottom:22px;
}

.ai-avatar{
width:34px;
height:34px;
object-fit:contain;
margin-top:5px;
flex-shrink:0;
}

.message{
padding:16px 18px;
border-radius:24px;
line-height:1.9;
font-size:15px;
max-width:700px;
word-wrap:break-word;
animation:fade .25s ease;
}

.ai-message{
background:#121212;
border:1px solid rgba(255,255,255,.05);
}

.user-message{
background:#44f1cf;
color:black;
font-weight:600;
}

/* ===================== */
/* PRODUCT CARD */
/* ===================== */

.product-card{
background:#0d0d0d;
border-radius:34px;
overflow:hidden;
margin-bottom:26px;
border:1px solid rgba(255,255,255,.06);
max-width:720px;
margin-left:46px;
animation:fade .3s ease;
}

.product-image{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
display:block;
background:#111;
transition:opacity .3s ease;
}

.product-content{ padding:24px; }

.product-title{
font-size:22px;
font-weight:700;
line-height:1.5;
margin-bottom:12px;
}

.product-price{
font-size:24px;
font-weight:700;
color:#44f1cf;
margin-bottom:12px;
}

.product-rating{
opacity:.75;
margin-bottom:20px;
font-size:15px;
}

/* ===================== */
/* VARIANT GROUPS */
/* ===================== */

.variant-groups{
margin-bottom:20px;
display:flex;
flex-direction:column;
gap:16px;
}

.variant-group{
display:flex;
flex-direction:column;
gap:8px;
}

.variant-group-label{
font-size:11px;
font-weight:600;
opacity:.4;
text-transform:uppercase;
letter-spacing:1.5px;
}

.variant-group-options{
display:flex;
flex-wrap:wrap;
gap:8px;
}

/* METAL BUTTONS */

.metal-btn{
padding:8px 16px;
border-radius:30px;
border:1px solid rgba(255,255,255,.15);
background:#141414;
color:white;
font-size:13px;
cursor:pointer;
transition:all .2s;
white-space:nowrap;
}

.metal-btn:hover{
border-color:#44f1cf;
color:#44f1cf;
}

.metal-btn.active{
background:#44f1cf;
color:black;
font-weight:700;
border-color:#44f1cf;
}

/* STONE COLOR CIRCLES */

.stone-btn{
width:36px;
height:36px;
border-radius:50%;
border:2px solid transparent;
cursor:pointer;
transition:all .2s;
position:relative;
flex-shrink:0;
}

.stone-btn:hover{
transform:scale(1.1);
}

.stone-btn.active{
border-color:#44f1cf;
box-shadow:0 0 12px rgba(68,241,207,.5);
transform:scale(1.15);
}

/* SIZE BUTTONS */

.size-btn{
padding:8px 14px;
border-radius:20px;
border:1px solid rgba(255,255,255,.15);
background:#141414;
color:white;
font-size:12px;
font-weight:600;
cursor:pointer;
transition:all .2s;
white-space:nowrap;
}

.size-btn:hover{
border-color:#44f1cf;
color:#44f1cf;
}

.size-btn.active{
background:#44f1cf;
color:black;
font-weight:700;
border-color:#44f1cf;
}

/* ===================== */
/* PRODUCT DESCRIPTION */
/* ===================== */

.product-description{
opacity:.65;
line-height:1.8;
font-size:14px;
margin-bottom:22px;
}

.product-buttons{ display:flex; gap:14px; }

.view-btn{
flex:1;
padding:16px;
border-radius:18px;
background:#44f1cf;
color:black;
font-weight:700;
text-align:center;
text-decoration:none;
font-size:17px;
}

.cart-btn{
flex:1;
padding:16px;
border:none;
border-radius:18px;
background:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

/* ===================== */
/* INPUT */
/* ===================== */

.input-area{
padding:24px;
display:flex;
gap:16px;
background:#050505;
border-top:1px solid rgba(255,255,255,.05);
flex-shrink:0;
}

.input{
flex:1;
background:#0f0f0f;
border:1px solid rgba(255,255,255,.06);
height:72px;
border-radius:24px;
padding:0 24px;
font-size:20px;
color:white;
outline:none;
}

.send-btn{
width:78px;
height:72px;
border:none;
border-radius:24px;
background:#44f1cf;
font-size:34px;
font-weight:bold;
cursor:pointer;
}

/* ===================== */
/* TYPING */
/* ===================== */

.typing-loader{ margin-bottom:20px; }

.typing-wrap{
display:flex;
gap:12px;
align-items:center;
}

.typing-bubble{
background:#121212;
padding:16px 18px;
border-radius:22px;
display:flex;
gap:6px;
}

.typing-bubble span{
width:8px;
height:8px;
border-radius:50%;
background:#44f1cf;
animation:bounce 1s infinite;
}

.typing-bubble span:nth-child(2){ animation-delay:.15s; }
.typing-bubble span:nth-child(3){ animation-delay:.3s; }

@keyframes bounce{
0%,80%,100%{ transform:scale(0); opacity:.3; }
40%{ transform:scale(1); opacity:1; }
}

@keyframes fade{
from{ opacity:0; transform:translateY(10px); }
to{ opacity:1; transform:translateY(0); }
}

@keyframes pulse-glow{
0%,100%{ box-shadow:0 0 25px rgba(68,241,207,.2), 0 0 50px rgba(68,241,207,.08); }
50%{ box-shadow:0 0 40px rgba(68,241,207,.4), 0 0 80px rgba(68,241,207,.15); }
}

.pull-tab{ display:none; }

.drawer-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
z-index:100;
opacity:0;
transition:opacity .3s ease;
pointer-events:none;
}

.drawer-overlay.open{ opacity:1; pointer-events:all; }

.drawer{
position:fixed;
top:0;
left:0;
width:80%;
max-width:320px;
height:100vh;
background:#0a0a0a;
border-right:1px solid rgba(255,255,255,.08);
z-index:101;
transform:translateX(-100%);
transition:transform .3s ease;
display:flex;
flex-direction:column;
padding:30px 24px;
overflow-y:auto;
}

.drawer.open{ transform:translateX(0); }

.drawer-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:30px;
}

.drawer-title{ font-size:18px; font-weight:700; }

.drawer-close{
width:36px;
height:36px;
border-radius:50%;
background:#1a1a1a;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

.drawer-section{ margin-bottom:28px; }

.drawer-section-title{
font-size:12px;
font-weight:600;
opacity:.4;
text-transform:uppercase;
letter-spacing:1.5px;
margin-bottom:14px;
}

.drawer-item{
background:#141414;
border-radius:16px;
padding:18px;
margin-bottom:12px;
border:1px solid rgba(255,255,255,.06);
display:flex;
align-items:center;
gap:14px;
cursor:pointer;
transition:border-color .2s;
}

.drawer-item:hover{ border-color:#44f1cf; }
.drawer-item-icon{ font-size:22px; }

.drawer-item-text{
display:flex;
flex-direction:column;
gap:3px;
flex:1;
}

.drawer-item-name{ font-size:15px; font-weight:600; }
.drawer-item-desc{ font-size:12px; opacity:.5; }

.drawer-item-badge{
background:#44f1cf;
color:black;
font-size:11px;
font-weight:700;
padding:4px 10px;
border-radius:20px;
white-space:nowrap;
}

@media(max-width:900px){
.sidebar{ width:120px; padding:20px 10px; }
.brand{ font-size:14px; }
.brand-sub{ font-size:11px; }
.chat-box{ padding:18px; }
.message{ max-width:92%; }
.product-card{ margin-left:0; }
.product-title{ font-size:18px; }
.input{ font-size:18px; }
}

@media(max-width:600px){

.sidebar{ display:none; }

.app{
display:block;
height:100vh;
position:relative;
}

.mobile-header{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:14px 20px 10px;
background:#060606;
border-bottom:1px solid rgba(68,241,207,.12);
position:fixed;
top:0;
left:0;
right:0;
z-index:10;
}

.mobile-header-logo{
width:52px;
height:52px;
border-radius:50%;
background:radial-gradient(circle at 40% 35%, #1a1a1a, #080808);
display:flex;
align-items:center;
justify-content:center;
border:1.5px solid rgba(68,241,207,.3);
animation:pulse-glow 3s ease-in-out infinite;
margin-bottom:6px;
overflow:hidden;
}

.mobile-header-logo img{
width:34px;
height:34px;
object-fit:contain;
}

.mobile-header-name{
font-size:15px;
font-weight:700;
letter-spacing:.5px;
display:flex;
align-items:center;
gap:8px;
margin-bottom:2px;
}

.mobile-header-dots{
display:flex;
gap:4px;
align-items:center;
}

.mobile-header-dots span{
width:4px;
height:4px;
border-radius:50%;
background:#44f1cf;
animation:bounce 1s infinite;
}

.mobile-header-dots span:nth-child(2){ animation-delay:.15s; }
.mobile-header-dots span:nth-child(3){ animation-delay:.3s; }

.mobile-header-sub{
font-size:10px;
opacity:.4;
letter-spacing:1.5px;
text-transform:uppercase;
}

.chat-area{
position:fixed;
top:106px;
left:0;
right:0;
bottom:0;
display:flex;
flex-direction:column;
overflow:hidden;
background:#000;
}

.chat-box{
flex:1;
min-height:0;
padding:16px;
overflow-y:auto;
}

.drawer-overlay{ display:block; }

.pull-tab{
display:flex;
align-items:center;
justify-content:center;
position:fixed;
left:0;
top:50%;
transform:translateY(-50%);
width:22px;
height:64px;
background:#44f1cf;
border-radius:0 8px 8px 0;
z-index:99;
cursor:pointer;
transition:width .2s;
}

.pull-tab::after{
content:"›";
color:black;
font-size:20px;
font-weight:900;
}

.pull-tab:hover{ width:28px; }

.product-card{
margin-left:0;
border-radius:24px;
width:100%;
}

.product-title{ font-size:17px; }
.product-price{ font-size:20px; }

.input-area{ padding:12px 16px; flex-shrink:0; }
.input{ font-size:16px; height:56px; }
.send-btn{ width:56px; height:56px; font-size:24px; }

}

</style>

</head>

<body>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
<div class="drawer-header">
<div class="drawer-title">✨ Studio</div>
<button class="drawer-close" onclick="closeDrawer()">✕</button>
</div>
<div class="drawer-section">
<div class="drawer-section-title">AI Photos</div>
<div class="drawer-item">
<div class="drawer-item-icon">🎨</div>
<div class="drawer-item-text">
<div class="drawer-item-name">Generate Image</div>
<div class="drawer-item-desc">AI photo for any product</div>
</div>
<div class="drawer-item-badge">2 Free</div>
</div>
</div>
<div class="drawer-section">
<div class="drawer-section-title">Account</div>
<div class="drawer-item">
<div class="drawer-item-icon">📧</div>
<div class="drawer-item-text">
<div class="drawer-item-name">Save & Continue</div>
<div class="drawer-item-desc">Enter email to unlock more</div>
</div>
</div>
</div>
</div>

<div class="pull-tab" id="pull-tab" onclick="openDrawer()"></div>

<div class="app">

<div class="sidebar">
<div class="sidebar-logo"><img src="deer.png"/></div>
<div class="brand">Alymwndw AI</div>
<div class="brand-sub">Luxury Jewelry Concierge</div>
</div>

<div class="chat-area">

<div class="mobile-header">
<div class="mobile-header-logo"><img src="deer.png"/></div>
<div class="mobile-header-name">
Alymwndw AI
<div class="mobile-header-dots">
<span></span><span></span><span></span>
</div>
</div>
<div class="mobile-header-sub">Luxury Jewelry Concierge</div>
</div>

<div class="chat-box" id="chat-box"></div>

<div class="input-area">
<input
id="message"
class="input"
placeholder="Ask Alymwndw AI..."
onkeydown="handleKey(event)"
/>
<button class="send-btn" onclick="sendMessage()">➜</button>
</div>

</div>

</div>

<script>

const chatBox = document.getElementById("chat-box");
let sessionId = null;

// =====================
// STONE COLORS MAP
// =====================

const stoneColorMap = {
  "white":   "#f5f5f5",
  "pink":    "#f48fb1",
  "rose":    "#e57373",
  "red":     "#c62828",
  "yellow":  "#f9c84a",
  "purple":  "#8e24aa",
  "blue":    "#1976d2",
  "green":   "#388e3c",
  "black":   "#212121",
  "orange":  "#ef6c00",
};

function getStoneColor(colorName) {
  const key = (colorName || "").toLowerCase();
  for (const [name, hex] of Object.entries(stoneColorMap)) {
    if (key.includes(name)) return hex;
  }
  return "#cccccc";
}

// =====================
// AUTO GREETING
// =====================

window.addEventListener("load", async () => {
  showTypingLoader();
  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: "__greeting__", sessionId: null }),
    });
    const data = await response.json();
    removeTypingLoader();
    if (data.sessionId) sessionId = data.sessionId;
    await typeMessage(data.reply);
  } catch (err) {
    removeTypingLoader();
  }
});

function openDrawer(){
document.getElementById("drawer").classList.add("open");
document.getElementById("drawer-overlay").classList.add("open");
}

function closeDrawer(){
document.getElementById("drawer").classList.remove("open");
document.getElementById("drawer-overlay").classList.remove("open");
}

function showTypingLoader(){
const loader = document.createElement("div");
loader.className = "typing-loader";
loader.id = "typing-loader";
loader.innerHTML = `
<div class="typing-wrap">
<img src="deer.png" class="ai-avatar"/>
<div class="typing-bubble">
<span></span><span></span><span></span>
</div>
</div>
`;
chatBox.appendChild(loader);
chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTypingLoader(){
const loader = document.getElementById("typing-loader");
if(loader) loader.remove();
}

async function typeMessage(text){
const row = document.createElement("div");
row.className = "message-row";
const avatar = document.createElement("img");
avatar.src = "deer.png";
avatar.className = "ai-avatar";
const bubble = document.createElement("div");
bubble.className = "message ai-message";
row.appendChild(avatar);
row.appendChild(bubble);
chatBox.appendChild(row);
chatBox.scrollTop = chatBox.scrollHeight;
const words = text.split(" ");
const chunkSize = 3;
let current = "";
for(let i = 0; i < words.length; i += chunkSize){
const chunk = words.slice(i, i + chunkSize).join(" ");
current += (current ? " " : "") + chunk;
bubble.innerText = current;
chatBox.scrollTop = chatBox.scrollHeight;
await new Promise((r) => setTimeout(r, 18));
}
bubble.innerText = text;
chatBox.scrollTop = chatBox.scrollHeight;
}

function addUserMessage(text){
const row = document.createElement("div");
row.className = "user-row";
const bubble = document.createElement("div");
bubble.className = "message user-message";
bubble.innerText = text;
row.appendChild(bubble);
chatBox.appendChild(row);
chatBox.scrollTop = chatBox.scrollHeight;
}

// =====================
// RENDER PRODUCTS
// =====================

function renderProducts(products){
products.forEach((product) => {

const variants = product.variants || [];
const url = product.url || `https://alymwndw.com/products/${product.handle}`;
const imageId = `img-${product.handle}`;
const priceId = `price-${product.handle}`;

// =====================
// GROUP OPTIONS
// =====================

const metalSet = new Set();
const stoneColorSet = new Set();
const stoneSizeSet = new Set();
const shapeSet = new Set();

variants.forEach((v) => {
  if (v.metal) metalSet.add(v.metal);
  if (v.stoneColor) stoneColorSet.add(v.stoneColor);
  if (v.stoneSize) stoneSizeSet.add(v.stoneSize);
  if (v.shape) shapeSet.add(v.shape);
});

const metals = [...metalSet];
const stoneColors = [...stoneColorSet];
const stoneSizes = [...stoneSizeSet];
const shapes = [...shapeSet];

// STATE
let selectedMetal = metals[0] || "";
let selectedStoneColor = stoneColors[0] || "";
let selectedStoneSize = stoneSizes[0] || "";
let selectedShape = shapes[0] || "";

// FIRST VARIANT
const firstVariant = variants[0] || {};
const defaultImage =
  firstVariant.mappedImage ||
  firstVariant.image ||
  product.image ||
  "https://via.placeholder.com/500";

const defaultPrice =
  String(firstVariant.price || product.price || "")
  .replace("AED", "").trim();

// =====================
// FIND MATCHING VARIANT
// =====================

function findVariant() {
  return variants.find((v) =>
    (!selectedMetal || v.metal === selectedMetal) &&
    (!selectedStoneColor || v.stoneColor === selectedStoneColor) &&
    (!selectedStoneSize || v.stoneSize === selectedStoneSize) &&
    (!selectedShape || v.shape === selectedShape)
  ) || variants.find((v) =>
    (!selectedMetal || v.metal === selectedMetal)
  ) || variants[0];
}

function updateCard() {
  const v = findVariant();
  if (!v) return;
  const img = document.getElementById(imageId);
  const priceEl = document.getElementById(priceId);
  if (img && (v.mappedImage || v.image)) {
    img.src = v.mappedImage || v.image;
  }
  if (priceEl && v.price) {
    priceEl.innerText = String(v.price).replace("AED", "").trim() + " AED";
  }
}

// =====================
// BUILD CARD
// =====================

const card = document.createElement("div");
card.className = "product-card";

// BUILD VARIANT GROUPS HTML
let variantGroupsHTML = '<div class="variant-groups">';

// METALS
if (metals.length > 0) {
  variantGroupsHTML += `
  <div class="variant-group">
    <div class="variant-group-label">Material</div>
    <div class="variant-group-options" id="metals-${product.handle}">
      ${metals.map((m, i) => `
        <button
          class="metal-btn ${i === 0 ? 'active' : ''}"
          data-metal="${m}"
          onclick="selectMetal('${product.handle}', '${m}', this)"
        >${m}</button>
      `).join("")}
    </div>
  </div>`;
}

// STONE COLORS
if (stoneColors.length > 0) {
  variantGroupsHTML += `
  <div class="variant-group">
    <div class="variant-group-label">Stone Color</div>
    <div class="variant-group-options" id="stones-${product.handle}">
      ${stoneColors.map((c, i) => `
        <button
          class="stone-btn ${i === 0 ? 'active' : ''}"
          data-stone="${c}"
          title="${c}"
          style="background:${getStoneColor(c)}; box-shadow: inset 0 0 0 1px rgba(255,255,255,.2);"
          onclick="selectStone('${product.handle}', '${c}', this)"
        ></button>
      `).join("")}
    </div>
  </div>`;
}

// SHAPES
if (shapes.length > 0) {
  variantGroupsHTML += `
  <div class="variant-group">
    <div class="variant-group-label">Shape</div>
    <div class="variant-group-options" id="shapes-${product.handle}">
      ${shapes.map((s, i) => `
        <button
          class="metal-btn ${i === 0 ? 'active' : ''}"
          data-shape="${s}"
          onclick="selectShape('${product.handle}', '${s}', this)"
        >${s}</button>
      `).join("")}
    </div>
  </div>`;
}

// SIZES
if (stoneSizes.length > 0) {
  variantGroupsHTML += `
  <div class="variant-group">
    <div class="variant-group-label">Stone Size</div>
    <div class="variant-group-options" id="sizes-${product.handle}">
      ${stoneSizes.map((s, i) => `
        <button
          class="size-btn ${i === 0 ? 'active' : ''}"
          data-size="${s}"
          onclick="selectSize('${product.handle}', '${s}', this)"
        >${s}</button>
      `).join("")}
    </div>
  </div>`;
}

variantGroupsHTML += '</div>';

card.innerHTML = `
<img id="${imageId}" src="${defaultImage}" class="product-image" onerror="this.src='https://via.placeholder.com/500'"/>
<div class="product-content">
<div class="product-title">${product.title}</div>

// =====================
// SELECTION HANDLERS
// =====================

function selectMetal(handle, metal, btn) {
  const state = window[`state_${handle}`];
  if (!state) return;
  state.selectedMetal = metal;
  btn.closest(".variant-group-options")
    .querySelectorAll(".metal-btn")
    .forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  updateVariant(handle);
}

function selectStone(handle, stone, btn) {
  const state = window[`state_${handle}`];
  if (!state) return;
  state.selectedStoneColor = stone;
  btn.closest(".variant-group-options")
    .querySelectorAll(".stone-btn")
    .forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  updateVariant(handle);
}

function selectShape(handle, shape, btn) {
  const state = window[`state_${handle}`];
  if (!state) return;
  state.selectedShape = shape;
  btn.closest(".variant-group-options")
    .querySelectorAll(".metal-btn")
    .forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  updateVariant(handle);
}

function selectSize(handle, size, btn) {
  const state = window[`state_${handle}`];
  if (!state) return;
  state.selectedStoneSize = size;
  btn.closest(".variant-group-options")
    .querySelectorAll(".size-btn")
    .forEach((b) => b.classList.remove("active"));
  btn.classList.add("active");
  updateVariant(handle);
}

function updateVariant(handle) {
  const state = window[`state_${handle}`];
  if (!state) return;

  const { variants, selectedMetal, selectedStoneColor, selectedStoneSize, selectedShape, imageId, priceId } = state;

  // Find best matching variant
  let match = variants.find((v) =>
    (!selectedMetal || v.metal === selectedMetal) &&
    (!selectedStoneColor || v.stoneColor === selectedStoneColor) &&
    (!selectedStoneSize || v.stoneSize === selectedStoneSize) &&
    (!selectedShape || v.shape === selectedShape)
  );

  // Fallback - match metal only
  if (!match) {
    match = variants.find((v) =>
      (!selectedMetal || v.metal === selectedMetal)
    );
  }

  // Fallback - first variant
  if (!match) match = variants[0];

  if (!match) return;

  const img = document.getElementById(imageId);
  const priceEl = document.getElementById(priceId);

  if (img && (match.mappedImage || match.image)) {
    img.style.opacity = "0.7";
    setTimeout(() => {
      img.src = match.mappedImage || match.image;
      img.style.opacity = "1";
    }, 150);
  }

  if (priceEl && match.price) {
    priceEl.innerText = String(match.price).replace("AED", "").trim() + " AED";
  }
}

// =====================
// HANDLE ENTER
// =====================

function handleKey(event){
if(event.key==="Enter"){ sendMessage(); }
}

// =====================
// SEND MESSAGE
// =====================

async function sendMessage(){
const input = document.getElementById("message");
const message = input.value.trim();
if(!message) return;
addUserMessage(message);
input.value = "";
showTypingLoader();
try {
const response = await fetch("/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message,sessionId})
});
const data = await response.json();
if(data.sessionId){ sessionId = data.sessionId; }
removeTypingLoader();
await typeMessage(data.reply);
if(data.products && data.products.length){
setTimeout(()=>{ renderProducts(data.products); },300);
}
} catch(err) {
removeTypingLoader();
await typeMessage("Something went wrong, please try again.");
}
}

</script>
