<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;
font-family:Arial,sans-serif;
height:100vh;
overflow:hidden;
color:white;

}

/* ===================== */
/* MAIN LAYOUT */
/* ===================== */

.app{

display:flex;
height:100vh;

}

/* ===================== */
/* SIDEBAR */
/* ===================== */

.sidebar{

width:240px;
background:#060606;

border-right:
1px solid rgba(255,255,255,.06);

padding:30px 20px;

display:flex;
flex-direction:column;
align-items:center;

}

.sidebar-logo{

width:90px;
height:90px;

border-radius:50%;

background:#0c0c0c;

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 0 30px rgba(0,255,200,.15);

margin-bottom:25px;

overflow:hidden;

}

.sidebar-logo img{

width:58px;
height:58px;
object-fit:contain;

}

.brand{

font-size:22px;
font-weight:700;
text-align:center;
line-height:1.3;
margin-bottom:10px;

}

.brand-sub{

opacity:.65;
text-align:center;
line-height:1.5;
font-size:15px;

}

/* ===================== */
/* CHAT AREA */
/* ===================== */

.chat-area{

flex:1;
display:flex;
flex-direction:column;
background:#000;

}

.chat-box{

flex:1;
overflow-y:auto;

padding:30px;

scroll-behavior:smooth;

}

/* ===================== */
/* MESSAGE ROW */
/* ===================== */

.message-row{

display:flex;
gap:12px;
margin-bottom:22px;
align-items:flex-start;

}

.user-row{

display:flex;
justify-content:flex-end;
margin-bottom:22px;

}

/* ===================== */
/* AVATAR */
/* ===================== */

.ai-avatar{

width:34px;
height:34px;

object-fit:contain;

margin-top:5px;

}

/* ===================== */
/* MESSAGE */
/* ===================== */

.message{

padding:16px 18px;

border-radius:24px;

line-height:1.9;

font-size:15px;

max-width:700px;

word-wrap:break-word;

animation:fade .25s ease;

}

.ai-message{

background:#121212;

border:
1px solid rgba(255,255,255,.05);

}

.user-message{

background:#44f1cf;
color:black;
font-weight:600;

}

/* ===================== */
/* PRODUCT CARD */
/* ===================== */

.product-card{

background:#0d0d0d;

border-radius:34px;

overflow:hidden;

margin-bottom:26px;

border:
1px solid rgba(255,255,255,.06);

max-width:720px;

margin-left:46px;

animation:fade .3s ease;

}

.product-image{

width:100%;
aspect-ratio:1/1;
object-fit:cover;
display:block;

background:#111;

}

.product-content{

padding:24px;

}

.product-title{

font-size:24px;
font-weight:700;
line-height:1.5;
margin-bottom:14px;

}

.product-price{

font-size:22px;
font-weight:700;
color:#44f1cf;

margin-bottom:14px;

}

.product-rating{

opacity:.85;
margin-bottom:18px;
font-size:18px;

}

.variant-box{

background:#141414;

padding:18px;

border-radius:20px;

margin-bottom:20px;

}

.product-info{

margin-bottom:10px;
opacity:.9;
font-size:15px;

}

.product-description{

opacity:.72;
line-height:1.8;
font-size:15px;

margin-bottom:24px;

}

.product-buttons{

display:flex;
gap:14px;

}

.view-btn{

flex:1;

padding:18px;

border-radius:18px;

background:#44f1cf;
color:black;

font-weight:700;

text-align:center;

text-decoration:none;

font-size:18px;

}

.cart-btn{

flex:1;

padding:18px;

border:none;

border-radius:18px;

background:white;

font-size:18px;
font-weight:700;

cursor:pointer;

}

/* ===================== */
/* INPUT */
/* ===================== */

.input-area{

padding:24px;

display:flex;
gap:16px;

background:#050505;

border-top:
1px solid rgba(255,255,255,.05);

}

.input{

flex:1;

background:#0f0f0f;

border:
1px solid rgba(255,255,255,.06);

height:72px;

border-radius:24px;

padding:0 24px;

font-size:20px;

color:white;

outline:none;

}

.send-btn{

width:78px;
height:72px;

border:none;

border-radius:24px;

background:#44f1cf;

font-size:34px;
font-weight:bold;

cursor:pointer;

}

/* ===================== */
/* TYPING */
/* ===================== */

.typing-loader{

margin-bottom:20px;

}

.typing-wrap{

display:flex;
gap:12px;
align-items:center;

}

.typing-bubble{

background:#121212;

padding:16px 18px;

border-radius:22px;

display:flex;
gap:6px;

}

.typing-bubble span{

width:8px;
height:8px;

border-radius:50%;

background:#44f1cf;

animation:bounce 1s infinite;

}

.typing-bubble span:nth-child(2){

animation-delay:.15s;

}

.typing-bubble span:nth-child(3){

animation-delay:.3s;

}

@keyframes bounce{

0%,80%,100%{
transform:scale(0);
opacity:.3;
}

40%{
transform:scale(1);
opacity:1;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ===================== */
/* MOBILE */
/* ===================== */

@media(max-width:900px){

.sidebar{

width:120px;
padding:20px 10px;

}

.brand{

font-size:14px;

}

.brand-sub{

font-size:11px;

}

.chat-box{

padding:18px;

}

.message{

max-width:92%;

}

.product-card{

margin-left:0;

}

.product-title{

font-size:18px;

}

.input{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-logo">

<img
src="deer.png"
/>

</div>

<div class="brand">
Alymwndw AI
</div>

<div class="brand-sub">
Luxury Jewelry Concierge
</div>

</div>

<!-- CHAT -->

<div class="chat-area">

<div
class="chat-box"
id="chat-box"
></div>

<!-- INPUT -->

<div class="input-area">

<input

id="message"

class="input"

placeholder="Ask Alymwndw AI..."

onkeydown="handleKey(event)"

/>

<button

class="send-btn"

onclick="sendMessage()"

>

➜

</button>

</div>

</div>

</div>

<script>

const chatBox =
document.getElementById("chat-box");

// =====================
// TYPE MESSAGE
// =====================

async function typeMessage(text){

const row =
document.createElement("div");

row.className =
"message-row";

const avatar =
document.createElement("img");

avatar.src =
"deer.png";

avatar.className =
"ai-avatar";

const bubble =
document.createElement("div");

bubble.className =
"message ai-message";

row.appendChild(avatar);

row.appendChild(bubble);

chatBox.appendChild(row);

chatBox.scrollTop =
chatBox.scrollHeight;

let current = "";

const words =
text.split(" ");

for(let i=0;i<words.length;i++){

current +=
words[i] + " ";

bubble.innerText =
current;

chatBox.scrollTop =
chatBox.scrollHeight;

await new Promise((r)=>

setTimeout(r,35)

);

}

}

// =====================
// USER MESSAGE
// =====================

function addUserMessage(text){

const row =
document.createElement("div");

row.className =
"user-row";

const bubble =
document.createElement("div");

bubble.className =
"message user-message";

bubble.innerText =
text;

row.appendChild(bubble);

chatBox.appendChild(row);

chatBox.scrollTop =
chatBox.scrollHeight;

}

// =====================
// ENTER
// =====================

function handleKey(event){

if(event.key === "Enter"){

sendMessage();

}

}

// =====================
// PRODUCTS
// =====================

function renderProducts(products){

products.forEach((product)=>{

const variant =
product.variants?.[0] || {};

const image =

variant.image ||

product.image ||

"https://via.placeholder.com/500";

const cleanPrice =

String(
variant.price ||
product.price ||
""
)

.replace("AED","")
.trim();

const url =

product.url ||

`https://alymwndw.com/products/${product.handle}`;

const card =
document.createElement("div");

card.className =
"product-card";

card.innerHTML = `

<img
src="${image}"
class="product-image"
/>

<div class="product-content">

<div class="product-title">
${product.title}
</div>

<div class="product-price">
${cleanPrice} AED
</div>

<div class="product-rating">
⭐ ${product.reviewRating || 4.9}
(${product.reviewCount || 120} reviews)
</div>

<div class="variant-box">

<div class="product-info">
💎 Variant:
${variant.title || "Luxury Edition"}
</div>

<div class="product-info">
📦 ${
variant.available !== false
? "In Stock"
: "Out OfStock"
}
</div>

</div>

<div class="product-description">

${(product.description || "")
.slice(0,140)}...

</div>

<div class="product-buttons">

<a

href="${url}"

target="_blank"

class="view-btn"

>

View Product

</a>

<button

class="cart-btn"

onclick="window.open('${url}','_blank')"

>

Add To Cart

</button>

</div>

</div>

`;

chatBox.appendChild(card);

});

chatBox.scrollTop =
chatBox.scrollHeight;

}

// =====================
// SEND MESSAGE
// =====================

async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value.trim();

if(!message) return;

// USER

addUserMessage(message);

input.value = "";

// LOADER

const loader =
document.createElement("div");

loader.className =
"typing-loader";

loader.innerHTML = `

<div class="typing-wrap">

<img
src="deer.png"
class="ai-avatar"
/>

<div class="typing-bubble">

<span></span>
<span></span>
<span></span>

</div>

</div>

`;

chatBox.appendChild(loader);

chatBox.scrollTop =
chatBox.scrollHeight;

// FETCH

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

loader.remove();

// AI MESSAGE

await typeMessage(
data.reply
);

// PRODUCTS

if(
data.products &&
data.products.length
){

setTimeout(()=>{

renderProducts(
data.products
);

},300);

}

}

</script>

</body>

</html>
