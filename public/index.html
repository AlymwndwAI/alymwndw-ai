<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

body{
margin:0;
padding:0;
background:#050505;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
width:420px;
background:#111;
padding:20px;
border-radius:30px;
box-shadow:
0 0 35px rgba(0,255,200,.15);
}

.logo{
font-size:42px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

.chat-box{
height:520px;
overflow-y:auto;
background:#1b1b1b;
padding:15px;
border-radius:20px;
margin-bottom:15px;
}

.message{
padding:15px;
border-radius:18px;
margin-bottom:12px;
max-width:85%;
line-height:1.8;
white-space:pre-wrap;
}

.user{
background:#19e0bc;
color:black;
margin-left:auto;
}

.ai{
background:#2b2b2b;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:15px;
background:#222;
color:white;
font-size:16px;
}

button{
padding:16px;
border:none;
border-radius:15px;
background:#19e0bc;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.product-card{
background:#222;
padding:15px;
border-radius:20px;
margin-bottom:20px;
}

.product-card img{
width:100%;
border-radius:18px;
margin-bottom:12px;
}

.product-card h3{
margin:0 0 10px;
}

.product-card p{
line-height:1.7;
}

.price{
font-size:22px;
font-weight:bold;
color:#19e0bc;
margin-top:10px;
}

.buy-btn{
display:block;
margin-top:15px;
background:#19e0bc;
padding:14px;
text-align:center;
border-radius:14px;
text-decoration:none;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
💎 Alymwndw AI
</div>

<div
class="chat-box"
id="chat-box"
></div>

<div class="input-area">

<input
id="message"
placeholder="Ask about jewelry..."
onkeydown="handleKey(event)"
>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const chatBox =
document.getElementById("chat-box");


// =====================================
// ADD TEXT MESSAGE
// =====================================

function addMessage(text,type){

const div =
document.createElement("div");

div.className =
`message ${type}`;

div.innerText =
text;

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

}


// =====================================
// ADD PRODUCT CARD
// =====================================

function addProduct(product){

const div =
document.createElement("div");

div.className =
"product-card";

div.innerHTML = `

<img src="${product.image}" />

<h3>
${product.title}
</h3>

<p>
${product.description}
</p>

<div class="price">
${product.price} AED
</div>

<a
class="buy-btn"
href="${product.link}"
target="_blank"
>
View Product
</a>

`;

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

}


// =====================================
// ENTER BUTTON
// =====================================

function handleKey(event){

if(event.key === "Enter"){
sendMessage();
}

}


// =====================================
// SEND MESSAGE
// =====================================

async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value;

if(!message) return;

addMessage(message,"user");

input.value = "";

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();


// =====================================
// PRODUCTS
// =====================================

if(data.products){

data.products.forEach(product => {

addProduct(product);

});

return;

}


// =====================================
// AI REPLY
// =====================================

addMessage(
data.reply,
"ai"
);

}

</script>

</body>
</html>
