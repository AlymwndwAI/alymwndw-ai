<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alymwndw AI</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:420px;
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,200,.15);
}

h1{
text-align:center;
margin-bottom:20px;
}

.chat-box{
height:350px;
overflow-y:auto;
background:#1b1b1b;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.message{
padding:12px;
border-radius:12px;
margin-bottom:10px;
max-width:80%;
}

.user{
background:#00d4aa;
color:black;
margin-left:auto;
}

.ai{
background:#2d2d2d;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:#222;
color:white;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#00d4aa;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>
💎 Alymwndw AI
</h1>

<div
class="chat-box"
id="chat-box"
></div>

<div class="input-area">

<input
id="message"
placeholder="Ask about jewelry..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const chatBox =
document.getElementById("chat-box");

function addMessage(text,type){

const div =
document.createElement("div");

div.className =
`message ${type}`;

div.innerText =
text;

chatBox.appendChild(div);

chatBox.scrollTop =
chatBox.scrollHeight;

}

async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value;

if(!message) return;

addMessage(message,"user");

input.value = "";

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

addMessage(data.reply,"ai");

}

</script>

</body>
</html>
