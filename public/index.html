<!DOCTYPE html>
<html>

<head>

  <title>Alymwndw Jewellery AI</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      background:#050505;
      font-family:Arial;
      color:white;
      overflow:hidden;
    }

    .header{

      background:black;

      padding:25px;

      font-size:34px;

      font-weight:bold;

      text-align:center;

      border-bottom:1px solid #222;

      position:fixed;

      width:100%;

      top:0;

      z-index:1000;

    }

    .chat{

      padding:20px;

      padding-top:140px;

      padding-bottom:140px;

      height:100vh;

      overflow:auto;

    }

    .msg{

      max-width:88%;

      padding:20px;

      border-radius:28px;

      margin-bottom:20px;

      line-height:1.8;

      font-size:18px;

      word-wrap:break-word;

    }

    .user{

      background:#11d9c5;

      color:black;

      margin-left:auto;

      border-bottom-right-radius:8px;

    }

    .bot{

      background:#171717;

      color:white;

      border-bottom-left-radius:8px;

    }

    .inputArea{

      position:fixed;

      bottom:0;

      width:100%;

      background:#050505;

      padding:15px;

      display:flex;

      gap:10px;

      border-top:1px solid #222;

    }

    input{

      flex:1;

      padding:18px;

      border:none;

      border-radius:40px;

      font-size:17px;

      background:#171717;

      color:white;

      outline:none;

    }

    button{

      background:#11d9c5;

      border:none;

      border-radius:40px;

      padding:0 28px;

      font-size:17px;

      font-weight:bold;

      cursor:pointer;

      color:black;

    }

    .product{

      background:white;

      color:black;

      border-radius:30px;

      padding:20px;

      margin-top:20px;

      box-shadow:0 10px 30px rgba(0,0,0,0.4);

    }

    .product img{

      width:100%;

      height:320px;

      object-fit:cover;

      border-radius:20px;

    }

    .product h3{

      margin-top:20px;

      font-size:20px;

      line-height:1.5;

    }

    .price{

      font-size:32px;

      font-weight:bold;

      margin-top:15px;

    }

    .viewBtn{

      display:inline-block;

      margin-top:20px;

      background:black;

      color:white;

      padding:14px 24px;

      border-radius:15px;

      text-decoration:none;

      font-weight:bold;

    }

    .typing{

      opacity:0.6;

      font-style:italic;

    }

  </style>

</head>

<body>

<div class="header">
💎 Alymwndw AI
</div>

<div class="chat" id="chat">

  <div class="msg bot">

    Welcome to Alymwndw Jewellery ✨

    <br><br>

    I can help you with:
    <br><br>

    • Gold Jewellery
    <br>
    • Diamond Rings
    <br>
    • Moissanite
    <br>
    • Luxury Earrings
    <br>
    • Platinum Jewelry
    <br>
    • Custom Jewelry
    <br><br>

    Ask me anything 💎

  </div>

</div>

<div class="inputArea">

  <input
    id="message"
    placeholder="Ask about jewellery..."
  />

  <button onclick="sendMessage()">
    Send
  </button>

</div>

<script>

async function sendMessage(){

  const input = document.getElementById("message");

  const message = input.value;

  if(!message) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg user">
      ${message}
    </div>
  `;

  input.value = "";

  chat.innerHTML += `
    <div class="msg bot typing" id="typing">
      Alymwndw AI is typing...
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;

  const response = await fetch("/chat",{

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({
      message
    })

  });

  const data = await response.json();

  document.getElementById("typing").remove();

  let productsHTML = "";

  if(data.products){

    data.products.forEach(product => {

      productsHTML += `

        <div class="product">

          <img src="${product.image}" />

          <h3>
            ${product.title}
          </h3>

          <div class="price">
            ${product.price} AED
          </div>

          <a
            class="viewBtn"
            href="https://${window.location.hostname}/products/${product.handle}"
            target="_blank"
          >
            View Product
          </a>

        </div>

      `;

    });

  }

  chat.innerHTML += `
    <div class="msg bot">

      ${data.reply}

      ${productsHTML}

    </div>
  `;

  chat.scrollTop = chat.scrollHeight;

}

document
  .getElementById("message")
  .addEventListener("keypress", function(e){

    if(e.key === "Enter"){
      sendMessage();
    }

});

</script>

</body>

</html>
