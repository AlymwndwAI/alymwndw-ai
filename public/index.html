<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;
font-family:Arial;
height:100vh;
overflow:hidden;
color:white;

}

.container{

display:flex;
height:100vh;
width:100%;

}

/* ========================= */
/* SIDEBAR */
/* ========================= */

.sidebar{

width:120px;
background:#070707;

border-right:
1px solid rgba(255,255,255,.06);

padding:20px 10px;

display:flex;
flex-direction:column;
align-items:center;

}

.logo-circle{

width:72px;
height:72px;

border-radius:50%;

background:#0f0f0f;

display:flex;
justify-content:center;
align-items:center;

margin-bottom:18px;

box-shadow:
0 0 25px rgba(67,255,209,.15);

}

.logo-circle img{

width:55px;
height:55px;
object-fit:contain;

}

.brand{

font-size:18px;
font-weight:bold;

text-align:center;

line-height:1.3;

margin-bottom:8px;

}

.subtitle{

font-size:13px;
opacity:.65;
text-align:center;
line-height:1.5;

}

/* ========================= */
/* CHAT */
/* ========================= */

.chat-area{

flex:1;

display:flex;
flex-direction:column;

background:#050505;

}

.chat-box{

flex:1;

overflow-y:auto;

padding:25px 18px;

scroll-behavior:smooth;

}

/* ========================= */
/* MESSAGES */
/* ========================= */

.message-row{

display:flex;
align-items:flex-start;

gap:10px;

margin-bottom:18px;

animation:fade .25s ease;

}

.message{

padding:18px;

border-radius:26px;

line-height:1.9;

font-size:16px;

max-width:88%;

word-wrap:break-word;

}

.ai-message{

background:#141414;
border:1px solid rgba(255,255,255,.06);

}

.user-row{

justify-content:flex-end;

}

.user-message{

background:#43ffd1;
color:black;

font-weight:600;

}

.ai-avatar{

width:42px;
height:42px;

object-fit:contain;

margin-top:4px;

}

/* ========================= */
/* INPUT */
/* ========================= */

.input-area{

padding:18px;

display:flex;
gap:14px;

border-top:
1px solid rgba(255,255,255,.05);

background:#050505;

}

.input-area input{

flex:1;

height:60px;

background:#121212;

border:none;
outline:none;

border-radius:22px;

padding:0 22px;

font-size:17px;

color:white;

}

.input-area button{

width:70px;
height:60px;

border:none;

border-radius:22px;

background:#43ffd1;

font-size:26px;

cursor:pointer;

}

/* ========================= */
/* PRODUCT CARD */
/* ========================= */

.product-card{

background:#121212;

border-radius:26px;

padding:18px;

margin-top:18px;

border:
1px solid rgba(255,255,255,.08);

overflow:hidden;

box-shadow:
0 0 25px rgba(0,0,0,.35);

animation:fade .35s ease;

}

.product-image{

width:100%;

height:auto;

max-height:320px;

display:block;

object-fit:cover;

border-radius:20px;

background:#111;

margin-bottom:16px;

}

.product-title{

font-size:24px;

font-weight:700;

line-height:1.5;

margin-bottom:12px;

}

.product-price{

font-size:30px;

font-weight:bold;

color:#43ffd1;

margin-bottom:14px;

}

.product-rating{

margin-bottom:14px;

font-size:15px;

opacity:.9;

}

.variant-box{

background:#1a1a1a;

padding:14px;

border-radius:18px;

margin-bottom:18px;

}

.product-info{

font-size:15px;

margin-bottom:10px;

line-height:1.6;

opacity:.92;

}

.product-description{

font-size:15px;

line-height:1.8;

opacity:.8;

margin-bottom:18px;

}

.product-buttons{

display:flex;

gap:12px;

}

.view-btn{

flex:1;

padding:15px;

border-radius:16px;

background:#43ffd1;

color:black;

font-weight:bold;

text-align:center;

text-decoration:none;

}

.cart-btn{

flex:1;

padding:15px;

border:none;

border-radius:16px;

background:white;

color:black;

font-weight:bold;

cursor:pointer;

}

/* ========================= */
/* LOADING */
/* ========================= */

.typing{

display:flex;
align-items:center;
gap:5px;

padding:10px 0;

}

.typing span{

width:8px;
height:8px;

background:#43ffd1;

border-radius:50%;

animation:bounce 1s infinite;

}

.typing span:nth-child(2){

animation-delay:.2s;

}

.typing span:nth-child(3){

animation-delay:.4s;

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
opacity:.4;
}

50%{
transform:translateY(-6px);
opacity:1;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-circle">

<img src="deer.png"/>

</div>

<div class="brand">
Alymwndw AI
</div>

<div class="subtitle">
Luxury Jewelry Concierge
</div>

</div>

<!-- CHAT -->

<div class="chat-area">

<div
class="chat-box"
id="chat-box"
>

</div>

<!-- INPUT -->

<div class="input-area">

<input
id="message"
placeholder="Ask Alymwndw AI..."
onkeydown="handleKey(event)"
>

<button onclick="sendMessage()">
➜
</button>

</div>

</div>

</div>

<script>

const chatBox =
document.getElementById("chat-box");

// =========================
// ADD MESSAGE
// =========================

function addMessage(
text,
type
){

const row =
document.createElement("div");

row.className =
`message-row ${type==="user"?"user-row":""}`;

if(type==="ai"){

row.innerHTML = `

<img
src="deer.png"
class="ai-avatar"
/>

<div class="message ai-message">
${text}
</div>

`;

}else{

row.innerHTML = `

<div class="message user-message">
${text}
</div>

`;

}

chatBox.appendChild(row);

chatBox.scrollTop =
chatBox.scrollHeight;

return row;

}

// =========================
// ENTER
// =========================

function handleKey(event){

if(event.key==="Enter"){

sendMessage();

}

}

// =========================
// PRODUCTS
// =========================

function renderProducts(products){

products.forEach((product)=>{

const variant =
product.variants?.[0] || {};

const image =

variant.image ||
product.image ||
"https://via.placeholder.com/500";

const price =

variant.price ||
product.price ||
"";

const url =

product.url ||
`https://alymwndw.com/products/${product.handle}`;

const card =
document.createElement("div");

card.className =
"product-card";

card.innerHTML = `

<img
src="${image}"
class="product-image"
/>

<div class="product-title">
${product.title}
</div>

<div class="product-price">
${price} AED
</div>

<div class="product-rating">
⭐ ${product.reviewRating || 4.9}
(${product.reviewCount || 264} reviews)
</div>

<div class="variant-box">

<div class="product-info">
💎 Variant:
${variant.title || "Luxury Variant"}
</div>

<div class="product-info">
📦 ${
variant.available !== false
? "In Stock"
: "Out Of Stock"
}
</div>

</div>

<div class="product-description">

${(product.description || "")
.slice(0,140)}...

</div>

<div class="product-buttons">

<a
href="${url}"
target="_blank"
class="view-btn"
>
View Product
</a>

<button
class="cart-btn"
onclick="window.open('${url}','_blank')"
>
Add To Cart
</button>

</div>

`;

chatBox.appendChild(card);

});

chatBox.scrollTop =
chatBox.scrollHeight;

}

// =========================
// SEND MESSAGE
// =========================

async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value.trim();

if(!message) return;

// USER

addMessage(
message,
"user"
);

input.value = "";

// TYPING

const typing =
document.createElement("div");

typing.className =
"message-row";

typing.innerHTML = `

<img
src="deer.png"
class="ai-avatar"
/>

<div class="message ai-message">

<div class="typing">

<span></span>
<span></span>
<span></span>

</div>

</div>

`;

chatBox.appendChild(typing);

chatBox.scrollTop =
chatBox.scrollHeight;

// FETCH

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

typing.remove();

// AI REPLY

addMessage(
data.reply,
"ai"
);

// PRODUCTS

if(
data.products &&
data.products.length
){

renderProducts(
data.products
);

}

}

</script>

</body>

</html>
