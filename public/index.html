<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

/* ========================= */
/* RESET */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;
font-family:Arial;

height:100dvh;

overflow:hidden;

color:white;

}

/* ========================= */
/* MAIN */
/* ========================= */

.container{

display:flex;

height:100vh;
width:100%;

background:#050505;

}

/* ========================= */
/* SIDEBAR */
/* ========================= */

.sidebar{

width:82px;

background:#050505;

border-right:
1px solid rgba(255,255,255,.05);

padding:14px 6px;

display:flex;
flex-direction:column;
align-items:center;

}

.logo-circle{

width:54px;
height:54px;

border-radius:50%;

background:#0d0d0d;

display:flex;
justify-content:center;
align-items:center;

margin-bottom:12px;

box-shadow:
0 0 18px rgba(67,255,209,.10);

}

.logo-circle img{

width:38px;
height:38px;

object-fit:contain;

}

.brand{

font-size:12px;
font-weight:bold;

text-align:center;

line-height:1.3;

margin-bottom:5px;

}

.subtitle{

font-size:10px;

opacity:.5;

text-align:center;

line-height:1.4;

}

/* ========================= */
/* CHAT AREA */
/* ========================= */

.chat-area{

flex:1;

display:flex;
flex-direction:column;

background:#050505;

max-width:100%;

}

.chat-box{

flex:1;

overflow-y:auto;

padding:18px 14px 120px;

scroll-behavior:smooth;

}

/* ========================= */
/* MESSAGE */
/* ========================= */

.message-row{

display:flex;
align-items:flex-start;

gap:10px;

margin-bottom:18px;

animation:fade .25s ease;

}

.user-row{

justify-content:flex-end;

}

.message{

padding:15px 16px;

border-radius:24px;

line-height:1.8;

font-size:15px;

max-width:84%;

word-wrap:break-word;

}

.ai-message{

background:#121212;

border:
1px solid rgba(255,255,255,.05);

}

.user-message{

background:#43ffd1;

color:black;

font-weight:600;

}

.ai-avatar{

width:34px;
height:34px;

object-fit:contain;

margin-top:4px;

}

/* ========================= */
/* INPUT */
/* ========================= */

.input-area{

padding:16px;

display:flex;
gap:12px;

background:rgba(5,5,5,.75);

backdrop-filter:blur(18px);

border-top:
1px solid rgba(255,255,255,.05);

position:sticky;

bottom:0;

}

.input-area input{

flex:1;

height:58px;

background:#111;

border:
1px solid rgba(255,255,255,.06);

outline:none;

border-radius:20px;

padding:0 20px;

font-size:16px;

color:white;

}

.input-area button{

width:62px;
height:58px;

border:none;

border-radius:20px;

background:#43ffd1;

color:black;

font-size:24px;

font-weight:bold;

cursor:pointer;

}

/* ========================= */
/* PRODUCT CARD */
/* ========================= */

.product-card{

background:#101010;

border-radius:24px;

padding:14px;

margin-top:14px;

border:
1px solid rgba(255,255,255,.06);

overflow:hidden;

box-shadow:
0 0 16px rgba(0,0,0,.24);

animation:fade .35s ease;

max-width:520px;

margin-left:auto;
margin-right:auto;

}

.product-image{

width:100%;

height:auto;

max-height:320px;

display:block;

object-fit:cover;

border-radius:18px;

background:#111;

margin-bottom:14px;

}

.product-title{

font-size:20px;

font-weight:700;

line-height:1.5;

margin-bottom:10px;

}

.product-price{

font-size:22px;

font-weight:bold;

color:#43ffd1;

margin-bottom:12px;

}

.product-rating{

margin-bottom:12px;

font-size:14px;

opacity:.9;

}

.variant-box{

background:#161616;

padding:14px;

border-radius:18px;

margin-bottom:16px;

}

.product-info{

font-size:14px;

margin-bottom:8px;

line-height:1.6;

opacity:.9;

}

.product-description{

font-size:14px;

line-height:1.8;

opacity:.75;

margin-bottom:18px;

}

.product-buttons{

display:flex;

gap:10px;

}

.view-btn{

flex:1;

padding:14px;

border-radius:16px;

background:#43ffd1;

color:black;

font-weight:bold;

text-align:center;

text-decoration:none;

}

.cart-btn{

flex:1;

padding:14px;

border:none;

border-radius:16px;

background:white;

color:black;

font-weight:bold;

cursor:pointer;

}

/* ========================= */
/* TYPING */
/* ========================= */

.typing{

display:flex;
align-items:center;
gap:5px;

padding:5px 0;

}

.typing span{

width:7px;
height:7px;

background:#43ffd1;

border-radius:50%;

animation:bounce 1s infinite;

}

.typing span:nth-child(2){

animation-delay:.2s;

}

.typing span:nth-child(3){

animation-delay:.4s;

}

@keyframes bounce{

0%,100%{
transform:translateY(0);
opacity:.4;
}

50%{
transform:translateY(-6px);
opacity:1;
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo-circle">

<img src="deer.png"/>

</div>

<div class="brand">
Alymwndw AI
</div>

<div class="subtitle">
Luxury Jewelry Concierge
</div>

</div>

<!-- CHAT -->

<div class="chat-area">

<div
class="chat-box"
id="chat-box"
></div>

<!-- INPUT -->

<div class="input-area">

<input
id="message"
placeholder="Ask Alymwndw AI..."
onkeydown="handleKey(event)"
>

<button onclick="sendMessage()">
➜
</button>

</div>

</div>

</div>

<script>

const chatBox =
document.getElementById("chat-box");

// =========================
// ADD MESSAGE
// =========================

function addMessage(
text,
type
){

const row =
document.createElement("div");

row.className =
`message-row ${type==="user"?"user-row":""}`;

if(type==="ai"){

row.innerHTML = `

<img
src="deer.png"
class="ai-avatar"
/>

<div class="message ai-message">
${text}
</div>

`;

}else{

row.innerHTML = `

<div class="message user-message">
${text}
</div>

`;

}

chatBox.appendChild(row);

chatBox.scrollTop =
chatBox.scrollHeight;

return row;

}

// =========================
// ENTER
// =========================

function handleKey(event){

if(event.key==="Enter"){

sendMessage();

}

}

// =========================
// PRODUCTS
// =========================

function renderProducts(products){

products.forEach((product)=>{

const variant =
product.variants?.[0] || {};

const image =

variant.image ||
product.image ||
"https://via.placeholder.com/500";

const price =

variant.price ||
product.price ||
"";

const fixedPrice =

price.toString().includes("AED")
? price.replace("AED AED","AED")
: price + " AED";

const url =

product.url ||
`https://alymwndw.com/products/${product.handle}`;

const card =
document.createElement("div");

card.className =
"product-card";

card.innerHTML = `

<img
src="${image}"
class="product-image"
/>

<div class="product-title">
${product.title}
</div>

<div class="product-price">
${fixedPrice}
</div>

<div class="product-rating">
⭐ ${product.reviewRating || 4.9}
(${product.reviewCount || 264} reviews)
</div>

<div class="variant-box">

<div class="product-info">
💎 Variant:
${variant.title || "Luxury Variant"}
</div>

<div class="product-info">
📦 ${
variant.available !== false
? "In Stock"
: "Out Of Stock"
}
</div>

</div>

<div class="product-description">

${(product.description || "")
.slice(0,140)}...

</div>

<div class="product-buttons">

<a
href="${url}"
target="_blank"
class="view-btn"
>
View Product
</a>

<button
class="cart-btn"
onclick="window.open('${url}','_blank')"
>
Add To Cart
</button>

</div>

`;

chatBox.appendChild(card);

});

chatBox.scrollTop =
chatBox.scrollHeight;

}

// =========================
// SEND MESSAGE
// =========================

async function sendMessage(){

const input =
document.getElementById("message");

const message =
input.value.trim();

if(!message) return;

// USER

addMessage(
message,
"user"
);

input.value = "";

// TYPING

const typing =
document.createElement("div");

typing.className =
"message-row";

typing.innerHTML = `

<img
src="deer.png"
class="ai-avatar"
/>

<div class="message ai-message">

<div class="typing">

<span></span>
<span></span>
<span></span>

</div>

</div>

`;

chatBox.appendChild(typing);

chatBox.scrollTop =
chatBox.scrollHeight;

// FETCH

const response =
await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
message
})

});

const data =
await response.json();

typing.remove();

// AI REPLY

addMessage(
data.reply,
"ai"
);

// PRODUCTS

if(
data.products &&
data.products.length
){

renderProducts(
data.products
);

}

}

</script>

</body>

</html>
