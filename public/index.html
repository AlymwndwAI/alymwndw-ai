<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Alymwndw AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#000;
color:white;
height:100vh;
overflow:hidden;

}

.header{

position:fixed;
top:0;
left:0;
right:0;

height:95px;

background:#000;

display:flex;
align-items:center;

padding:20px;

font-size:30px;
font-weight:bold;

border-bottom:1px solid #1d1d1d;

z-index:1000;

}

.header span{

margin-left:12px;

}

.chat{

position:fixed;

top:95px;

bottom:100px;

left:0;
right:0;

overflow-y:auto;

padding:20px;

scroll-behavior:smooth;

}

.message{

margin-bottom:22px;

display:flex;

flex-direction:column;

}

.user{

align-items:flex-end;

}

.bot{

align-items:flex-start;

}

.bubble{

max-width:88%;

padding:22px;

border-radius:28px;

line-height:1.8;

font-size:20px;

word-wrap:break-word;

}

.user .bubble{

background:#18dbc8;

color:#000;

border-bottom-right-radius:10px;

}

.bot .bubble{

background:#121212;

color:#fff;

border-bottom-left-radius:10px;

}

.inputArea{

position:fixed;

bottom:0;
left:0;
right:0;

height:100px;

background:#000;

display:flex;

align-items:center;

padding:15px;

gap:12px;

border-top:1px solid #1c1c1c;

}

.inputArea input{

flex:1;

height:65px;

border:none;

outline:none;

background:#111;

color:white;

padding:0 24px;

border-radius:40px;

font-size:20px;

}

.inputArea button{

width:120px;

height:65px;

border:none;

background:#18dbc8;

border-radius:40px;

font-size:22px;

font-weight:bold;

cursor:pointer;

color:black;

}

.product{

background:white;

color:black;

margin-top:25px;

border-radius:35px;

overflow:hidden;

width:100%;

box-shadow:0 0 30px rgba(255,255,255,0.06);

}

.product img{

width:100%;

height:420px;

object-fit:cover;

background:#f5f5f5;

}

.productContent{

padding:25px;

}

.product h3{

font-size:22px;

line-height:1.5;

margin-bottom:20px;

}

.price{

font-size:28px;

font-weight:bold;

margin-bottom:25px;

}

.viewBtn{

display:inline-block;

background:black;

color:white;

padding:16px 28px;

border-radius:18px;

text-decoration:none;

font-size:18px;

font-weight:bold;

}

.typing{

opacity:0.6;

font-style:italic;

}

.welcome{

font-size:20px;

line-height:2;

}

</style>

</head>

<body>

<div class="header">

💎 <span>Alymwndw AI</span>

</div>

<div class="chat" id="chat">

<div class="message bot">

<div class="bubble welcome">

Welcome to Alymwndw Jewellery ✨

<br><br>

I can help you with:

<br><br>

• Gold Jewellery  
• Diamond Rings  
• Moissanite  
• Platinum Jewellery  
• Silver Jewellery  
• Luxury Earrings  
• Custom Jewelry  

<br><br>

Ask me anything 💎

</div>

</div>

</div>

<div class="inputArea">

<input
id="message"
placeholder="Ask about jewellery..."
/>

<button onclick="sendMessage()">
Send
</button>

</div>

<script>

const chat = document.getElementById("chat");

async function sendMessage(){

const input = document.getElementById("message");

const message = input.value.trim();

if(!message) return;

chat.innerHTML += `

<div class="message user">

<div class="bubble">

${message}

</div>

</div>

`;

input.value = "";

chat.innerHTML += `

<div class="message bot" id="typingWrap">

<div class="bubble typing">

Alymwndw AI is typing...

</div>

</div>

`;

chat.scrollTop = chat.scrollHeight;

const response = await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message
})

});

const data = await response.json();

document.getElementById("typingWrap").remove();

let productsHTML = "";

if(data.products && data.products.length){

data.products.forEach(product => {

productsHTML += `

<div class="product">

<img src="${product.image}" />

<div class="productContent">

<h3>
${product.title}
</h3>

<div class="price">
${product.price} AED
</div>

<a
class="viewBtn"
href="https://${window.location.hostname}/products/${product.handle}"
target="_blank"
>
View Product
</a>

</div>

</div>

`;

});

}

chat.innerHTML += `

<div class="message bot">

<div class="bubble">

${data.reply}

${productsHTML}

</div>

</div>

`;

chat.scrollTop = chat.scrollHeight;

}

document
.getElementById("message")
.addEventListener("keypress", function(e){

if(e.key === "Enter"){

sendMessage();

}

});

</script>

</body>

</html>
